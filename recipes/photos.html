<html lang=en>

<mh-app>

<mh-avatar><mh-icon name="user"></mh-icon></mh-avatar>
</mh-navbar>

<nav>
<mh-submenu>
<header>Library</header>

</mh-page>
</main>
</mh-app>

<dialog id=lightbox>
<img src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='3'%20height='2'%3E%3Crect%20width='3'%20height='2'%20fill='%23e8746b'/%3E%3C/svg%3E" alt="Glacier lagoon, Iceland">
<p>Jökulsárlón glacier lagoon · 28 Jun 2026</p>
<footer>
<button type=button><mh-icon name="star"></mh-icon> Favorite</button>
<button type=button><mh-icon name="download"></mh-icon> Download</button>
<button>Close</button>
</footer>
</dialog>

<dialog id=upload>
<header>Upload photos</header>
<form>
<label>Photos
<input type=file multiple accept="image/*">
</label>
<label>Add to album
<input type=text value="Iceland 2026">
</label>
<label>Caption
<textarea placeholder="Say something about these photos…"></textarea>
</label>
</form>
<footer>
<button type=button>Cancel</button>
<button>Upload 4 photos</button>
</footer>
</dialog>

<script src="../maxhtml.js"></script>
</body>
</html>
