<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Friends — MaxHTML recipe</title>
<link rel=stylesheet href=../maxhtml.css>
</head>
<body>
<mh-app>
<mh-navbar>
<strong>Acme Social</strong>
<a href="#">Home</a>
<a href="#">Friends</a>
<mh-avatar><mh-icon name="user"></mh-icon></mh-avatar>
</mh-navbar>
<mh-sidemenu>
<header>Acme Social</header>
<nav>
<mh-submenu>
<header>You</header>
<a href="#" aria-current=page>Friends</a>
<a href="#">Profile</a>
<a href="#">Messages</a>
<a href="#">Settings</a>
</mh-submenu>
</nav>
</mh-sidemenu>
<main>
<mh-page>
<header>
<h1>Friends</h1>
<button>Find friends</button>
</header>
<mh-list>
<mh-item>
<mh-avatar>AL</mh-avatar>
<header><strong>Ada Lovelace</strong><small>12 mutual friends</small></header>
<footer>
<button type=button>Message</button>
<mh-menu>
<button>⋯</button>
<a href="#">Poke</a>
<a href="#">Remove friend</a>
<a href="#">Block</a>
</mh-menu>
</footer>
</mh-item>
<mh-item>
<mh-avatar>AT</mh-avatar>
<header><strong>Alan Turing</strong><small>8 mutual friends</small></header>
<footer>
<button type=button>Message</button>
<mh-menu>
<button>⋯</button>
<a href="#">Poke</a>
<a href="#">Remove friend</a>
<a href="#">Block</a>
</mh-menu>
</footer>
</mh-item>
<mh-item>
<mh-avatar>GH</mh-avatar>
<header><strong>Grace Hopper</strong><small>Sent you a friend request</small></header>
<footer>
<button>Add friend</button>
<button type=button>Decline</button>
</footer>
</mh-item>
</mh-list>
</mh-page>
</main>
</mh-app>
<script src="../maxhtml.js"></script>
</body>
</html>
