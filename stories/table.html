<h1>Table</h1>
<p>A plain native <code>&lt;table&gt;</code>, styled by the kit — no classes. Wrap it in an <code>&lt;mh-card&gt;</code> to give it a titled container.</p>
<h2>Example</h2>
<figure>
<mh-card>
<header>Recent reports</header>
<table>
<thead><tr><th>Name</th><th>Owner</th><th>Status</th></tr></thead>
<tbody>
<tr><td>Q3 revenue</td><td>Ada</td><td>Ready</td></tr>
<tr><td>Churn cohort</td><td>Lin</td><td>Draft</td></tr>
</tbody>
</table>
</mh-card>
</figure>
<h2>Usage</h2>
<pre><code>&lt;mh-card&gt;
  &lt;header&gt;Recent reports&lt;/header&gt;
  &lt;table&gt;...&lt;/table&gt;
&lt;/mh-card&gt;</code></pre>
