<h1>Navbar</h1>
<p>A horizontal top bar. Slots: a <code>&lt;strong&gt;</code> brand on the left; every link after it is pushed to the right.</p>
<h2>Example — brand + auth</h2>
<figure>
<mh-navbar>
<strong>Acme</strong>
<a>Login</a>
<a>Logout</a>
</mh-navbar>
</figure>
<h2>Example — brand + nav links</h2>
<figure>
<mh-navbar>
<strong>Acme</strong>
<a>Home</a>
<a>Docs</a>
<a>Pricing</a>
</mh-navbar>
</figure>
<h2>Usage</h2>
<pre><code>&lt;mh-navbar&gt;
  &lt;strong&gt;Acme&lt;/strong&gt;
  &lt;a&gt;Login&lt;/a&gt;
  &lt;a&gt;Logout&lt;/a&gt;
&lt;/mh-navbar&gt;</code></pre>
